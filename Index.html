<style>
    #heartCanvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1; /* Esto lo pone al fondo */
        pointer-events: none; /* Permite hacer clic en los botones de arriba */
    }
</style>

<canvas id="heartCanvas"></canvas>

<script>
    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    let hearts = [];

    class Heart {
        constructor() {
            this.reset();
        }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = canvas.height + 20;
            this.size = Math.random() * 12 + 8;
            this.speedY = Math.random() * 1.5 + 0.5;
            this.opacity = 1;
            this.color = `hsla(${Math.random() * 20 + 340}, 100%, 75%, `;
        }
        draw() {
            ctx.globalAlpha = this.opacity;
            ctx.fillStyle = this.color + this.opacity + ')';
            ctx.beginPath();
            const x = this.x, y = this.y, s = this.size;
            ctx.moveTo(x, y);
            ctx.bezierCurveTo(x - s/2, y - s/2, x - s, y + s/3, x, y + s);
            ctx.bezierCurveTo(x + s, y + s/3, x + s/2, y - s/2, x, y);
            ctx.fill();
        }
        update() {
            this.y -= this.speedY;
            this.opacity -= 0.003;
            if (this.opacity <= 0 || this.y < -20) this.reset();
        }
    }

    for (let i = 0; i < 40; i++) hearts.push(new Heart());

    function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        hearts.forEach(h => { h.update(); h.draw(); });
        requestAnimationFrame(loop);
    }
    loop();
</script>
