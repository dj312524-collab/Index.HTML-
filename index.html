<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOVE Heart Formation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            /* Fondo con degradado suave y romántico */
            background: radial-gradient(circle, #ffebee 0%, #fce4ec 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #d81b60;
            font-family: 'Arial', sans-serif;
        }
        canvas {
            display: block;
            position: absolute;
        }
        #ui {
            position: relative;
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }
        h1 {
            font-size: 2.5rem;
            text-shadow: 0 0 10px rgba(216, 27, 96, 0.3);
            margin: 0;
        }
    </style>
</head>
<body>

    <canvas id="heartCanvas"></canvas>

    <div id="ui">
        <h1>Para Ti</h1>
    </div>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        const textToDisplay = "LOVE"; // Letras que forman el corazón
        
        // Configuración de la forma del corazón (fórmula matemática)
        const heartScale = 15; 
        const amountOfParticles = 150; // Cuántas letras LOVE quieres

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        // Fórmula para obtener puntos en forma de corazón (t es ángulo)
        function getHeartPoint(t) {
            // Fórmulas paramétricas del corazón
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
            
            // Centrar y escalar
            return {
                x: width / 2 + x * heartScale,
                y: height / 2 + y * heartScale
            };
        }

        class Particle {
            constructor() {
                // Posición inicial aleatoria (fuera de la pantalla o dispersa)
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                
                // Elegir una letra aleatoria de "LOVE"
                this.letter = textToDisplay[Math.floor(Math.random() * textToDisplay.length)];
                
                // Color (variaciones de rosa/rojo vibrante)
                const hue = Math.random() * 20 + 330; 
                this.color = `hsla(${hue}, 90%, 60%, `;
                
                this.size = Math.random() * 10 + 15; // Tamaño de letra
                this.angle = Math.random() * Math.PI * 2; // Punto de destino en el corazón
                this.speed = Math.random() * 0.02 + 0.005; // Velocidad de "reunión"
                
                this.opacity = 0;
            }

            update() {
                // Destino en la silueta del corazón
                let target = getHeartPoint(this.angle);
                
                // Mover suavemente hacia el destino (interpolación)
                this.x += (target.x - this.x) * this.speed;
                this.y += (target.y - this.y) * this.speed;
                
                // Aparecer suavemente
                if (this.opacity < 1) this.opacity += 0.01;
            }

            draw() {
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = this.color + this.opacity + ')';
                ctx.font = `bold ${this.size}px Arial`;
                ctx.fillText(this.letter, this.x, this.y);
            }
        }

        function init() {
            particles = [];
            for (let i = 0; i < amountOfParticles; i++) {
                // Distribuir ángulos uniformemente para formar la silueta perfecta
                let p = new Particle();
                p.angle = (i / amountOfParticles) * Math.PI * 2;
                particles.push(p);
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            // Efecto de rastro suave (opcional, si quieres un rastro, no limpies todo)
            // ctx.fillStyle = 'rgba(255, 235, 238, 0.1)';
            // ctx.fillRect(0, 0, width, height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        init();
        animate();
    </script>
</body>
</html>
