<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corazón Mágico Animado</title>
    <style>
        body {
            margin: 0;
            background-color: #050005; /* Un negro casi púrpura muy profundo */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <canvas id="heartCanvas"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let particles = [];
        const textArray = ["LOVE", "I love you", "LOVE"];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor(angle) {
                this.angle = angle;
                this.text = textArray[Math.floor(Math.random() * textArray.length)];
                this.baseSize = Math.random() * 10 + 12;
                this.speed = Math.random() * 0.02 + 0.01;
                this.hue = Math.random() * 30 + 340; // Tonos rosas/rojos
                this.offset = Math.random() * Math.PI * 2; // Para que no todos pulsen igual
            }

            draw() {
                // Fórmula del corazón
                const x = 16 * Math.pow(Math.sin(this.angle), 3);
                const y = -(13 * Math.cos(this.angle) - 5 * Math.cos(2 * this.angle) - 2 * Math.cos(3 * this.angle) - Math.cos(4 * this.angle));
                
                // Escala con un latido suave
                const pulse = Math.sin(Date.now() * 0.002 + this.offset) * 5;
                const scale = (Math.min(width, height) / 40) + (pulse / 5);
                
                const finalX = width / 2 + x * scale;
                const finalY = height / 2 + y * scale;

                ctx.save();
                ctx.translate(finalX, finalY);
                
                // Brillo de neón
                ctx.shadowBlur = 15;
                ctx.shadowColor = `hsl(${this.hue}, 100%, 70%)`;
                ctx.fillStyle = `hsl(${this.hue}, 100%, 80%)`;
                ctx.font = `bold ${this.baseSize + pulse}px Arial`;
                ctx.textAlign = "center";
                
                ctx.fillText(this.text, 0, 0);
                ctx.restore();
            }
        }

        // Partículas pequeñas de fondo que flotan
        let sparkles = [];
        for(let i = 0; i < 100; i++) {
            sparkles.push({
                x: Math.random() * width,
                y: Math.random() * height,
                s: Math.random() * 2,
                v: Math.random() * 0.5 + 0.2
            });
        }

        function init() {
            particles = [];
            for (let i = 0; i < 80; i++) {
                particles.push(new Particle((i / 80) * Math.PI * 2));
            }
        }

        function animate() {
            // Fondo con un poco de transparencia para dejar rastro suave
            ctx.fillStyle = 'rgba(5, 0, 5, 0.15)';
            ctx.fillRect(0, 0, width, height);

            // Dibujar destellos de fondo
            sparkles.forEach(s => {
                ctx.fillStyle = "white";
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.s, 0, Math.PI * 2);
                ctx.fill();
                s.y -= s.v;
                if(s.y < 0) s.y = height;
            });

            particles.forEach(p => p.draw());
